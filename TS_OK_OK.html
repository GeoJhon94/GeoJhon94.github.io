<html>
<head>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #grafico { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="grafico"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        const serviceURL = urlParams.get('layer'); // Captura la URL de la capa desde el Dashboard

        // El fetch debe estar DENTRO del bloque if
        if (id && serviceURL) {
            const queryUrl = `${serviceURL}/query?where=Index_ok='${id}'&outFields=*&f=pjson`;
            
            fetch(queryUrl)
                .then(res => res.json())
                .then(response => {
                    if (!response.features || response.features.length === 0) {
                        document.body.innerHTML = `<div style='padding:20px;'>No se encontraron datos para el ID: ${id}</div>`;
                        return;
                    }

                    const attrs = response.features[0].attributes;
                    const excluir = ['FID','Age','Altitude','Aspect','Build','Build_Vol','Clay_0cm','Climatic_K','Curvature','Dams','Db_0cm','Den_Pob','Dts_r_365','DTS_r_90','DTS_st_365','DTS_st_90','DTS_v_365','DTS_v_90','easting','Edaf','Fault','Haz_clay','Haz_subsid','height','Index_ok','Inv_landsl','Inv_subsid','Land_Cover','latitude','Lito','longitude','mean_vel','Mining','name_procc','northing','pre_m_1','pre_m_30','pre_m_365','pre_m_90','pre_r_1','pre_r_30','pre_r_365','pre_r_90','pre_sl_1','pre_sl_30','pre_sl_365','pre_sl_90','pre_st_1','pre_st_30','pre_st_365','Process','Railways','Roads','Sand_0cm','SAR_geom','Slope','Sludge','Sus_landsl','TDS_trend','TDS_type','TPI','TRI','VS30','water_mass'];
                    
                    // 1. Filtrar y Ordenar columnas de fecha
                    const camposFechas = Object.keys(attrs)
                        .filter(key => !excluir.includes(key))
                        .sort(); 
                    
                    // 2. Limpieza de datos (Para que el eje Y no se bloquee)
                    const valoresY = camposFechas.map(f => {
                        let v = attrs[f];
                        let num = parseFloat(v);
                        return isNaN(num) ? null : num; 
                    });

                    const objetosFecha = camposFechas.map(f => {
                        let s = f.replace('D', '');
                        return `${s.substring(0,4)}-${s.substring(4,6)}-${s.substring(6,8)}`;
                    });

                    var data = [{
                        x: objetosFecha,
                        y: valoresY,
                        type: 'scatter',
                        mode: 'lines',
                        line: { color: '#1f77b4', width: 2, shape: 'spline' },
                        connectgaps: false 
                    }];

                    var layout = {
                        title: { text: 'Serie Temporal: ' + id },
                        xaxis: { 
                            type: 'date', 
                            title: 'Fecha',
                            rangeslider: { visible: true },
                            autorange: true
                        },
                        yaxis: { 
                            title: 'mm',
                            autorange: true, // Esto ajustará el eje Y según el punto seleccionado
                            fixedrange: false 
                        },
                        autosize: true,
                        margin: { t: 60, b: 40, l: 60, r: 30 }
                    };

                    Plotly.react('grafico', data, layout, {responsive: true});
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.body.innerHTML = "<div style='padding:20px;'>Error al conectar con ArcGIS.</div>";
                });
        } else {
            // Mensaje si faltan parámetros
            document.body.innerHTML = "<div style='padding:20px;'>Esperando selección... <br><small>Faltan parámetros id o layer en la URL.</small></div>";
        }
    </script>
</body>
</html>
