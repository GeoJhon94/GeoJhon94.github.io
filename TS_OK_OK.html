<html>
<head>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #grafico { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="grafico"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (id) {
            const serviceURL = "https://services-eu1.arcgis.com/WCEIifo5j3luTcRc/arcgis/rest/services/CTTC_ASTURIAS_S1_ASC_ok/FeatureServer/0";
            
            // 1. Añadimos /query y 2. Ponemos '${id}' entre comillas simples por ser TEXTO
            const queryUrl = `${serviceURL}/query?where=Index_ok='${id}'&outFields=*&f=pjson`;

            fetch(queryUrl)
                .then(res => res.json())
                .then(response => {
                    if (!response.features || response.features.length === 0) {
                        document.body.innerHTML = "<div style='padding:20px;'>No se encontraron datos para el ID: " + id + "</div>";
                        return;
                    }

                    const attrs = response.features[0].attributes;
                    
                    // Tu lista de exclusión (Asegúrate de que no falte ninguno)
                    const excluir = ['FID','Age','Altitude','Aspect','Build','Build_Vol','Clay_0cm','Climatic_K','Curvature','Dams','Db_0cm','Den_Pob','Dts_r_365','DTS_r_90','DTS_st_365','DTS_st_90','DTS_v_365','DTS_v_90','easting','Edaf','Fault','Haz_clay','Haz_subsid','height','Index_ok','Inv_landsl','Inv_subsid','Land_Cover','latitude','Lito','longitude','mean_vel','Mining','name_procc','northing','pre_m_1','pre_m_30','pre_m_365','pre_m_90','pre_r_1','pre_r_30','pre_r_365','pre_r_90','pre_sl_1','pre_sl_30','pre_sl_365','pre_sl_90','pre_st_1','pre_st_30','pre_st_365','Process','Railways','Roads','Sand_0cm','SAR_geom','Slope','Sludge','Sus_landsl','TDS_trend','TDS_type','TPI','TRI','VS30','water_mass'];
                    
                    // Filtrar y ordenar las columnas de fecha
                    const camposFechas = Object.keys(attrs)
                        .filter(key => !excluir.includes(key))
                        .sort(); // Ordenar cronológicamente (D20210101, D20210112...)
                    
                    const etiquetasX = camposFechas.map(f => f.replace('D', ''));
                    const valoresY = camposFechas.map(f => attrs[f]);

                    var data = [{
                        x: etiquetasX,
                        y: valoresY,
                        type: 'scatter',
                        mode: 'lines+markers',
                        line: { shape: 'spline', color: '#1f77b4' },
                        marker: { size: 4 }
                    }];

                    var layout = {
                        title: 'Serie Temporal - Punto: ' + id,
                        xaxis: { 
                            title: 'Fecha',
                            rangeslider: { visible: true } 
                        },
                        yaxis: { title: 'Desplazamiento (mm)' },
                        margin: { t: 60, b: 50, l: 60, r: 30 }
                    };

                    Plotly.newPlot('grafico', data, layout, {responsive: true});
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.body.innerHTML = "<div style='padding:20px;'>Error al conectar con la capa de ArcGIS. Revisa la consola (F12).</div>";
                });
        } else {
            document.body.innerHTML = "<div style='padding:20px;'>Esperando selección en el mapa...</div>";
        }
    </script>
</body>
</html>
