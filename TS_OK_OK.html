<html>
<head>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #grafico { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="grafico"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (id) {
            // 1. CAMBIA ESTA URL: Ve a la página de tu capa en ArcGIS Online, 
            // baja hasta "URL de la capa" (abajo a la derecha) y pégala aquí.
            // Debe terminar en "/0" (o el índice de tu capa).
            const serviceURL = "https://services-eu1.arcgis.com/WCEIifo5j3luTcRc/arcgis/rest/services/CTTC_ASTURIAS_S1_ASC_ok/FeatureServer/0";
            
            // 2. CAMBIA 'OBJECTID': Si tu campo de ID único se llama distinto (ej: 'ID_PUNTO'), cámbialo abajo.
            const queryUrl = `${serviceURL}?where=index_ok=${id}&outFields=*&f=pjson`;

            fetch(queryUrl)
                .then(res => res.json())
                .then(response => {
                    if (!response.features || response.features.length === 0) {
                        document.body.innerHTML = "No se encontraron datos para el ID: " + id;
                        return;
                    }

                    const attrs = response.features[0].attributes;
                    
                    // 3. LISTA DE EXCLUSIÓN: Escribe aquí los nombres de las columnas que NO quieres graficar.
                    // El resto (tus 303 campos de fecha) se graficarán automáticamente.
                    const excluir = ['FID','Age','Altitude','Aspect','Build','Build_Vol','Clay_0cm','Climatic_K','Curvature','Dams','Db_0cm','Den_Pob','Dts_r_365','DTS_r_90','DTS_st_365','DTS_st_90','DTS_v_365','DTS_v_90','easting','Edaf','Fault','Haz_clay','Haz_subsid','height','Index_ok','Inv_landsl','Inv_subsid','Land_Cover','latitude','Lito','longitude','mean_vel','Mining','name_procc','northing','pre_m_1','pre_m_30','pre_m_365','pre_m_90','pre_r_1','pre_r_30','pre_r_365','pre_r_90','pre_sl_1','pre_sl_30','pre_sl_365','pre_sl_90','pre_st_1','pre_st_1','pre_st_30','pre_st_365','Process','Railways','Roads','Sand_0cm','SAR_geom','Slope','Sludge','Sus_landsl','TDS_trend','TDS_type','TPI','TRI','VS30','water_mass'];
                    
                    const camposFechas = Object.keys(attrs).filter(key => !excluir.includes(key));
                    
                    // 4. LIMPIEZA DE NOMBRES (OPCIONAL): 
                    // Si tus columnas se llaman 'F2023_01', puedes quitar la 'F' para que el eje X se vea bien.
                    const etiquetasX = camposFechas.map(f => f.replace('D', ''));
                    const valoresY = camposFechas.map(f => attrs[f]);

                    var data = [{
                        x: etiquetasX,
                        y: valoresY,
                        type: 'scatter',
                        mode: 'lines+markers',
                        line: { shape: 'spline', color: '#1f77b4' },
                        marker: { size: 4 }
                    }];

                    var layout = {
                        title: 'Serie Temporal - Registro ' + id,
                        xaxis: { 
                            title: 'Fecha/Periodo',
                            rangeslider: { visible: true } // Esto ayuda con los 303 puntos
                        },
                        yaxis: { title: 'Valor medido' },
                        margin: { t: 50, b: 50, l: 50, r: 20 }
                    };

                    Plotly.newPlot('grafico', data, layout, {responsive: true});
                })
                .catch(err => {
                    console.error("Error:", err);
                    document.body.innerHTML = "Error al conectar con la capa de ArcGIS.";
                });
        } else {
            document.body.innerHTML = "Selecciona un punto en el mapa para ver su gráfica.";
        }
    </script>
</body>
</html>
