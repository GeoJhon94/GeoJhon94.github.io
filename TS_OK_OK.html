<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div id="grafico"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        // FUNCIÓN QUE SÍ FUNCIONA (La de prueba que ya viste)
        function dibujar(f, v, titulo) {
            Plotly.newPlot('grafico', [{x: f, y: v, type: 'scatter', mode: 'lines+markers'}], {title: titulo});
        }

        if (!id) {
            dibujar(["2024-01-01"], [0], "ESPERANDO ID EN URL...");
        } else {
            // Usamos una técnica que Chrome no bloquea (JSONP/Fetch simple)
            const service = "https://services-eu1.arcgis.com/WCEIifo5j3luTcRc/arcgis/rest/services/CTTC_ASTURIAS_S1_ASC_ok/FeatureServer/0/query";
            const query = service + "?where=index_ok=" + id + "&outFields=*&f=pjson";

            fetch(query)
                .then(r => r.json())
                .then(data => {
                    const feat = data.features[0].attributes;
                    const cols = Object.keys(feat).filter(k => k.startsWith('D')).sort();
                    const valores = cols.map(c => feat[c]);
                    const fechas = cols.map(c => c.substring(1,5)+"-"+c.substring(5,7)+"-"+c.substring(7,9));
                    
                    dibujar(fechas, valores, "ID REAL: " + id);
                })
                .catch(e => {
                    dibujar(["2024-01-01"], [0], "ERROR DE CONEXIÓN ARCGIS");
                });
        }
    </script>
</body>
</html>
