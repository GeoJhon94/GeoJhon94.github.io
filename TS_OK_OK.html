<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div id="status" style="font-family:sans-serif; padding:10px;">Conectando...</div>
    <div id="grafico"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (!id) {
            document.getElementById('status').innerText = "Esperando selección en el mapa...";
        } else {
            // Dividimos la URL para que GitHub no la bloquee
            const parte1 = "https://services-eu1.arcgis.com/WCEIifo5j3luTcRc/";
            const parte2 = "arcgis/rest/services/CTTC_ASTURIAS_S1_ASC_ok/FeatureServer/0/query";
            const fullURL = parte1 + parte2 + "?where=index_ok=" + id + "&outFields=*&f=json";

            fetch(fullURL)
                .then(r => r.json())
                .then(json => {
                    if (json.features && json.features.length > 0) {
                        const attrs = json.features[0].attributes;
                        const fechasFiltradas = Object.keys(attrs).filter(k => k.indexOf('D') === 0).sort();
                        
                        const xData = fechasFiltradas.map(f => f.substring(1,5)+"-"+f.substring(5,7)+"-"+f.substring(7,9));
                        const yData = fechasFiltradas.map(f => attrs[f]);

                        document.getElementById('status').style.display = 'none';
                        Plotly.newPlot('grafico', [{
                            x: xData,
                            y: yData,
                            type: 'scatter',
                            mode: 'lines+markers'
                        }], { title: 'Serie Punto: ' + id });
                    } else {
                        document.getElementById('status').innerText = "ID no encontrado.";
                    }
                })
                .catch(e => { document.getElementById('status').innerText = "Error de red."; });
        }
    </script>
</body>
</html>
