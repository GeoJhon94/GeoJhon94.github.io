<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div id="status" style="font-family:sans-serif; padding:10px;">Buscando datos...</div>
    <div id="grafico"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (!id) {
            document.getElementById('status').innerText = "Por favor, selecciona un punto en el mapa.";
        } else {
            // URL de tu servicio de ArcGIS
            const serviceURL = "https://services-eu1.arcgis.com/WCEIifo5j3luTcRc/arcgis/rest/services/CTTC_ASTURIAS_S1_ASC_ok/FeatureServer/0/query";
            const finalURL = serviceURL + "?where=index_ok=" + id + "&outFields=*&f=json";

            fetch(finalURL)
                .then(response => response.json())
                .then(json => {
                    if (json.features && json.features.length > 0) {
                        const attrs = json.features[0].attributes;
                        
                        // Buscamos columnas D y ordenamos
                        const columnasD = Object.keys(attrs).filter(k => k.startsWith('D')).sort();
                        const valores = columnasD.map(c => attrs[c]);
                        const fechas = columnasD.map(c => c.substring(1,5)+"-"+c.substring(5,7)+"-"+c.substring(7,9));

                        document.getElementById('status').style.display = 'none';

                        var data = [{
                            x: fechas,
                            y: valores,
                            type: 'scatter',
                            mode: 'lines+markers',
                            name: 'ID: ' + id
                        }];

                        Plotly.newPlot('grafico', data, {title: 'Serie Temporal Real: ' + id});
                    } else {
                        document.getElementById('status').innerText = "No se encontraron datos para el ID " + id;
                    }
                })
                .catch(err => {
                    document.getElementById('status').innerText = "Error al conectar con ArcGIS";
                });
        }
    </script>
</body>
</html>
