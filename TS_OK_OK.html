<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #grafico { width: 100%; height: 400px; }
    </style>
</head>
<body>

    <div id="status">Iniciando...</div>
    <div id="grafico"></div>

    <script>
        // 1. Extraer el ID de la URL
        var urlParams = new URLSearchParams(window.location.search);
        var id = urlParams.get('id');

        if (!id) {
            document.getElementById('status').innerText = "Esperando ID del punto...";
        } else {
            document.getElementById('status').innerText = "Buscando datos para el punto: " + id;
            cargarDatos(id);
        }

        function cargarDatos(idSeleccionado) {
            // URL de consulta a tu servicio de ArcGIS
            var serviceURL = "https://services-eu1.arcgis.com/WCEIifo5j3luTcRc/arcgis/rest/services/CTTC_ASTURIAS_S1_ASC_ok/FeatureServer/0/query";
            var finalURL = serviceURL + "?where=index_ok=" + idSeleccionado + "&outFields=*&f=json";

            fetch(finalURL)
                .then(function(response) { return response.json(); })
                .then(function(json) {
                    if (json.features && json.features.length > 0) {
                        var attrs = json.features[0].attributes;
                        
                        // Buscamos columnas que empiezan por D
                        var columnasD = Object.keys(attrs).filter(function(key) {
                            return key.indexOf('D') === 0;
                        }).sort();

                        var valores = columnasD.map(function(c) { return attrs[c]; });
                        var fechas = columnasD.map(function(c) {
                            // Convertimos D20240101 a 2024-01-01
                            return c.substring(1, 5) + "-" + c.substring(5, 7) + "-" + c.substring(7, 9);
                        });

                        document.getElementById('status').style.display = 'none';

                        // Pintamos con Plotly (como tú tenías)
                        var data = [{
                            x: fechas,
                            y: valores,
                            type: 'scatter',
                            mode: 'lines+markers',
                            marker: { color: 'blue' }
                        }];

                        var layout = {
                            title: 'Serie Temporal: ' + idSeleccionado,
                            margin: { t: 50, b: 50, l: 50, r: 50 }
                        };

                        Plotly.newPlot('grafico', data, layout);
                    } else {
                        document.getElementById('status').innerText = "No se encontraron datos.";
                    }
                })
                .catch(function(err) {
                    document.getElementById('status').innerText = "Error de conexión.";
                    console.log(err);
                });
        }
    </script>
</body>
</html>
