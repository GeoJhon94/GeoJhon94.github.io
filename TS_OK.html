<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Serie Temporal</title>
    <style>
        body { font-family: sans-serif; margin: 10px; }
        #mensaje { color: #888; text-align: center; margin-top: 20px; }
        canvas { width: 100% !important; height: auto !important; }
    </style>
</head>
<body>

    <div id="mensaje">Esperando selección de punto...</div>
    <canvas id="miGrafica"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (id) {
            document.getElementById('mensaje').innerText = "Cargando datos del ID: " + id;
            
            // URL de consulta (Query)
            const url = "https://services-eu1.arcgis.com/WCEIifo5j3luTcRc/arcgis/rest/services/CTTC_ASTURIAS_S1_ASC_ok/FeatureServer/0/query?where=index_ok=" + id + "&outFields=*&f=json";

            fetch(url)
                .then(res => res.json())
                .then(res => {
                    if (res.features && res.features.length > 0) {
                        const atributos = res.features[0].attributes;
                        document.getElementById('mensaje').style.display = 'none';
                        generarGrafica(atributos, id);
                    } else {
                        document.getElementById('mensaje').innerText = "No hay datos para index_ok=" + id;
                    }
                })
                .catch(err => {
                    document.getElementById('mensaje').innerText = "Error en la conexión con ArcGIS";
                    console.error(err);
                });
        }

        function generarGrafica(datos, idLabel) {
            // Filtrar y ordenar campos que empiezan por D
            const fechas = Object.keys(datos)
                .filter(k => k.startsWith('D'))
                .sort();

            const valores = fechas.map(f => datos[f]);
            const etiquetas = fechas.map(f => f.substring(1, 5) + "-" + f.substring(5, 7) + "-" + f.substring(7, 9));

            new Chart(document.getElementById('miGrafica'), {
                type: 'line',
                data: {
                    labels: etiquetas,
                    datasets: [{
                        label: 'Serie Temporal - ID ' + idLabel,
                        data: valores,
                        borderColor: '#007aff',
                        tension: 0.2,
                        fill: false
                    }]
                }
            });
        }
    </script>
</body>
</html>
