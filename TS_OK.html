<html>
<head>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <div id="mensaje" style="font-family:sans-serif;color:#666;text-align:center;">Cargando serie temporal...</div>
    <div id="grafico"></div>

    <script>
        // 1. Capturamos el ID desde la URL (?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (id) {
            // 2. Consultamos a tu FeatureServer usando el index_ok
            const serviceUrl = "https://services-eu1.arcgis.com/WCEIifo5j3luTcRc/arcgis/rest/services/CTTC_ASTURIAS_S1_ASC_ok/FeatureServer/0/query";
            const queryUrl = serviceUrl + "?where=index_ok=" + id + "&outFields=*&f=json";

            fetch(queryUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.features && data.features.length > 0) {
                        const atributos = data.features[0].attributes;
                        
                        // 3. Filtramos las columnas que empiezan con D
                        const columnasD = Object.keys(atributos)
                            .filter(k => k.startsWith('D'))
                            .sort();

                        const fechas = columnasD.map(f => f.substring(1, 5) + "-" + f.substring(5, 7) + "-" + f.substring(7, 9));
                        const valores = columnasD.map(f => atributos[f]);

                        // 4. Pintamos con Plotly (tu librería)
                        document.getElementById('mensaje').style.display = 'none';
                        var trace = {
                            x: fechas,
                            y: valores,
                            type: 'scatter',
                            mode: 'lines+markers',
                            name: 'Punto ' + id,
                            line: {color: '#1f77b4'}
                        };

                        Plotly.newPlot('grafico', [trace], {
                            title: 'Serie Temporal: ' + id,
                            xaxis: { title: 'Fecha' },
                            yaxis: { title: 'Valor' }
                        });
                    } else {
                        document.getElementById('mensaje').innerText = "No hay datos para el ID: " + id;
                    }
                })
                .catch(err => {
                    document.getElementById('mensaje').innerText = "Error al consultar ArcGIS";
                });
        } else {
            document.getElementById('mensaje').innerText = "Por favor, selecciona un punto en el mapa.";
        }
    </script>
</body>
</html>
